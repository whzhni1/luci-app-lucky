name: Sync luci-app-lucky

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Clone upstream luci-app-lucky
        run: |
          git clone --depth=1 https://github.com/sirpdboy/luci-app-lucky tmp_lucky

      - name: Replace local luci-app-lucky folder
        run: |
          rm -rf luci-app-lucky
          cp -r tmp_lucky/luci-app-lucky ./luci-app-lucky

      - name: Patch paths (/etc/lucky → /etc/config/lucky.daji)
        run: |
          find luci-app-lucky -type f \( -name "*.sh" -o -name "*.init" \
            -o -name "*.config" -o -name "*.lua" -o -name "Makefile" \) \
            | xargs grep -rl '/etc/lucky' 2>/dev/null \
            | while read f; do
                sed -i 's|/etc/lucky|/etc/config/lucky.daji|g' "$f"
                echo "patched: $f"
              done

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add luci-app-lucky
          git commit -m "Sync luci-app-lucky from upstream & patch paths" || echo "No changes"
          git push || true
