name: Auto Build Lucky1

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建'
        type: boolean
        default: false

env:
  RELEASE_URL: "https://release.66666.host"
  UPSTREAM_REPO: "https://github.com/sirpdboy/luci-app-lucky"

jobs:
  # ──────────────────────────────────────────────────────
  # 1. 检查版本
  # ──────────────────────────────────────────────────────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version:     ${{ steps.check.outputs.version }}
      ver_num:     ${{ steps.check.outputs.ver_num }}
      need_update: ${{ steps.check.outputs.need_update }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check versions
        id: check
        run: |
          REMOTE=$(curl -sL "$RELEASE_URL/" \
            | grep -oE 'href="\./v[0-9]+\.[0-9]+\.[0-9]+/"' \
            | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' \
            | sort -V | tail -1)
          LOCAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VER_NUM="${REMOTE#v}"

          echo "version=$REMOTE"  >> $GITHUB_OUTPUT
          echo "ver_num=$VER_NUM" >> $GITHUB_OUTPUT
          echo "Remote=$REMOTE  Local=$LOCAL"

          if [ "${{ inputs.force_build }}" = "true" ] || [ -z "$LOCAL" ]; then
            echo "need_update=true" >> $GITHUB_OUTPUT
          elif [ "$REMOTE" = "$LOCAL" ]; then
            echo "need_update=false" >> $GITHUB_OUTPUT
          else
            HIGHER=$(printf '%s\n%s' "$LOCAL" "$REMOTE" | sort -V | tail -1)
            [ "$HIGHER" = "$REMOTE" ] \
              && echo "need_update=true"  >> $GITHUB_OUTPUT \
              || echo "need_update=false" >> $GITHUB_OUTPUT
          fi

  # ──────────────────────────────────────────────────────
  # 2. 准备资源
  # ──────────────────────────────────────────────────────
  prepare:
    needs: check-version
    if: needs.check-version.outputs.need_update == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
      VER_NUM: ${{ needs.check-version.outputs.ver_num }}
    outputs:
      linux_archs: ${{ steps.download.outputs.linux_archs }}
    steps:
      # 2-a. 克隆上游源码（所有文件都在这里）
      - name: Clone upstream
        run: git clone --depth=1 "$UPSTREAM_REPO" upstream

      # 2-b. 统一 sed 替换（在 upstream 目录内操作）
      - name: Apply patches
        working-directory: upstream
        run: |
          find . -type f \( -name "*.sh" -o -name "*.init" \
            -o -name "*.config" -o -name "*.lua" -o -name "Makefile" \) \
            | xargs grep -rl '/etc/lucky' 2>/dev/null \
            | while read f; do
                sed -i 's|/etc/lucky|/etc/config/lucky.daji|g' "$f"
                echo "patched: $f"
              done

      # 2-c. 同步版本号（lucky/Makefile 现在已存在于 upstream/lucky/Makefile）
      - name: Sync PKG_VERSION
        run: |
          MAKEFILE="upstream/lucky/Makefile"
          echo "=== 修改前 ==="
          grep "^PKG_VERSION" "$MAKEFILE"
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VER_NUM/" "$MAKEFILE"
          echo "=== 修改后 ==="
          grep "^PKG_VERSION" "$MAKEFILE"

      # 2-d. 修改 Build/Prepare：把 wget 逻辑替换为从本地复制
      #      使用 python 处理多行替换更可靠
      - name: Patch Makefile Build/Prepare
        run: |
          python3 - <<'EOF'
          import re, pathlib

          mk = pathlib.Path("upstream/lucky/Makefile").read_text()

          new_prepare = """\
          define Build/Prepare
          \tmkdir -p $(PKG_BUILD_DIR)
          \t@echo ">>> lucky_arch=$(LUCKY_ARCH)  bin_dir=$(LUCKY_BIN_DIR)"
          \t@if [ ! -f "$(LUCKY_BIN_DIR)/$(LUCKY_ARCH)/lucky" ]; then \\
          \t\techo "❌ 未找到预置二进制: $(LUCKY_BIN_DIR)/$(LUCKY_ARCH)/lucky"; \\
          \t\texit 1; \\
          \tfi
          \tcp "$(LUCKY_BIN_DIR)/$(LUCKY_ARCH)/lucky" "$(PKG_BUILD_DIR)/lucky"
          \t@echo "✅ 已复制二进制 [$(LUCKY_ARCH)]"
          endef"""

          # 替换 define Build/Prepare ... endef 块
          mk = re.sub(
              r'define Build/Prepare.*?endef',
              new_prepare,
              mk,
              flags=re.DOTALL
          )

          # 同时把 LUCKY_ARCH / LUCKY_BIN_DIR 变量声明插入到 include package.mk 之前
          inject = (
              "\n# CI 注入：外部传入时直接使用，本地构建时自动推导\n"
              "LUCKY_BIN_DIR ?= /tmp/lucky-binaries\n\n"
          )
          mk = mk.replace(
              "include $(INCLUDE_DIR)/package.mk",
              inject + "include $(INCLUDE_DIR)/package.mk"
          )

          pathlib.Path("upstream/lucky/Makefile").write_text(mk)
          print("✅ Makefile Build/Prepare 替换完成")
          EOF

          echo "=== 替换后 Build/Prepare ==="
          sed -n '/define Build\/Prepare/,/endef/p' upstream/lucky/Makefile

      # 2-e. 下载 Linux 二进制，输出可用架构列表
      - name: Download Linux binaries & detect archs
        id: download
        run: |
          BASE_URL="${RELEASE_URL}/${VERSION}/${VER_NUM}_wanji"

          # 从发布页面解析所有 Linux 文件名
          ALL_FILES=$(curl -sL "${RELEASE_URL}/${VERSION}/" \
            | grep -oE "lucky_${VER_NUM}_Linux_[^\"' <]+" \
            | grep '\.tar\.gz$' \
            | sort -u)

          echo "=== 发现以下 Linux 文件 ==="
          echo "$ALL_FILES"
          echo ""

          SUCCESS_ARCHS=()
          while IFS= read -r filename; do
            [ -z "$filename" ] && continue
            # 提取架构名: lucky_2.27.2_Linux_arm64_wanji.tar.gz → arm64
            arch=$(echo "$filename" \
              | sed -E "s/lucky_${VER_NUM}_Linux_(.+)_wanji\.tar\.gz/\1/")
            [ -z "$arch" ] && continue

            DEST="binaries/${arch}"
            mkdir -p "$DEST"

            echo "⬇️  [$arch] $BASE_URL/$filename"
            if wget -q -O "/tmp/${arch}.tar.gz" "${BASE_URL}/${filename}"; then
              tar -xzf "/tmp/${arch}.tar.gz" -C "$DEST" 2>/dev/null
              if [ -f "$DEST/lucky" ]; then
                chmod +x "$DEST/lucky"
                SUCCESS_ARCHS+=("\"$arch\"")
                echo "  ✅ $arch OK"
              else
                echo "  ⚠️  $arch 解压后无 lucky 二进制"
              fi
            else
              echo "  ❌ $arch 下载失败"
            fi
          done <<< "$ALL_FILES"

          JSON="[$(IFS=,; echo "${SUCCESS_ARCHS[*]}")]"
          echo "linux_archs=$JSON" >> $GITHUB_OUTPUT
          echo ""
          echo "=== 最终可用架构: $JSON ==="

      # 2-f. 上传 artifact
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: binaries/

      # 上传整个修改后的上游源码树
      - name: Upload patched source
        uses: actions/upload-artifact@v4
        with:
          name: source
          path: upstream/   # lucky/ luci-app-lucky/ 都在里面

  # ──────────────────────────────────────────────────────
  # 3. SDK 编译
  # ──────────────────────────────────────────────────────
  build:
    needs: [check-version, prepare]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk: [openwrt-24.10, openwrt-25.12]
        lucky_arch: ${{ fromJson(needs.prepare.outputs.linux_archs) }}
        include:
          - { lucky_arch: x86_64,           sdk_arch: x86_64               }
          - { lucky_arch: i386,             sdk_arch: i386_pentium4         }
          - { lucky_arch: arm64,            sdk_arch: aarch64_generic       }
          - { lucky_arch: armv7,            sdk_arch: arm_cortex-a9_vfpv3-d16 }
          - { lucky_arch: armv6,            sdk_arch: arm_cortex-a7         }
          - { lucky_arch: armv5,            sdk_arch: arm_xscale            }
          - { lucky_arch: mipsle_softfloat, sdk_arch: mipsel_24kc           }
          - { lucky_arch: mipsle_hardfloat, sdk_arch: mipsel_74kc           }
          - { lucky_arch: mips_softfloat,   sdk_arch: mips_24kc             }
          - { lucky_arch: mips_hardfloat,   sdk_arch: mips_74kc             }
          - { lucky_arch: riscv64,          sdk_arch: riscv64_riscv64       }
        exclude:
          - sdk_arch: ""
    steps:
      - name: Download patched source
        uses: actions/download-artifact@v4
        with:
          name: source
          path: openwrt-packages   # SDK 会把这个目录作为 feed

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: /tmp/lucky-binaries

      - name: Fix binary permissions
        run: |
          BIN="/tmp/lucky-binaries/${{ matrix.lucky_arch }}/lucky"
          if [ ! -f "$BIN" ]; then
            echo "❌ 缺少二进制: $BIN，跳过此架构"
            exit 1
          fi
          chmod +x "$BIN"

      - name: Build with OpenWrt SDK
        uses: sbwml/openwrt-gh-action-sdk@main
        env:
          ARCH: ${{ matrix.sdk_arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: lucky luci-app-lucky
          NO_REFRESH_CHECK: true
          LUCKY_ARCH: ${{ matrix.lucky_arch }}
          LUCKY_BIN_DIR: /tmp/lucky-binaries

      - name: Upload packages
        uses: actions/upload-artifact@v4
        if: hashFiles('bin/packages/**/*.ipk') != ''
        with:
          name: ipk-${{ matrix.lucky_arch }}-${{ matrix.sdk }}
          path: bin/packages/**/*.ipk

  # ──────────────────────────────────────────────────────
  # 4. 发布
  # ──────────────────────────────────────────────────────
  release:
    needs: [check-version, build]
    if: always() && needs.check-version.outputs.need_update == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release/
          pattern: ipk-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: Lucky ${{ needs.check-version.outputs.version }}
          files: release/**/*.ipk
