name: Auto Build Lucky2

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建'
        type: boolean
        default: false

env:
  RELEASE_URL: "https://release.66666.host"
  UPSTREAM_REPO: "https://github.com/sirpdboy/luci-app-lucky"

jobs:
  # ──────────────────────────────────────────────────────
  # 1. 检查版本
  # ──────────────────────────────────────────────────────
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version:     ${{ steps.check.outputs.version }}
      ver_num:     ${{ steps.check.outputs.ver_num }}
      need_update: ${{ steps.check.outputs.need_update }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check versions
        id: check
        run: |
          REMOTE=$(curl -sL "$RELEASE_URL/" \
            | grep -oE 'href="\./v[0-9]+\.[0-9]+\.[0-9]+/"' \
            | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' \
            | sort -V | tail -1)
          LOCAL=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VER_NUM="${REMOTE#v}"

          echo "version=$REMOTE"  >> $GITHUB_OUTPUT
          echo "ver_num=$VER_NUM" >> $GITHUB_OUTPUT
          echo "Remote=$REMOTE  Local=$LOCAL"

          if [ "${{ inputs.force_build }}" = "true" ] || [ -z "$LOCAL" ]; then
            echo "need_update=true" >> $GITHUB_OUTPUT
          elif [ "$REMOTE" = "$LOCAL" ]; then
            echo "need_update=false" >> $GITHUB_OUTPUT
          else
            HIGHER=$(printf '%s\n%s' "$LOCAL" "$REMOTE" | sort -V | tail -1)
            [ "$HIGHER" = "$REMOTE" ] \
              && echo "need_update=true"  >> $GITHUB_OUTPUT \
              || echo "need_update=false" >> $GITHUB_OUTPUT
          fi

  # ──────────────────────────────────────────────────────
  # 2. 准备资源（克隆上游 + sed 替换 + 下载二进制）
  # ──────────────────────────────────────────────────────
  prepare:
    needs: check-version
    if: needs.check-version.outputs.need_update == 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.check-version.outputs.version }}
      VER_NUM: ${{ needs.check-version.outputs.ver_num }}
    steps:
      # 2-a. 克隆上游
      - name: Clone upstream
        run: git clone --depth=1 "$UPSTREAM_REPO" upstream

      # 2-b. 统一 sed 替换配置目录
      - name: Apply patches
        working-directory: upstream
        run: |
          find . -type f \( -name "*.sh" -o -name "*.init" \
            -o -name "*.config" -o -name "*.lua" -o -name "Makefile" \) \
            | xargs grep -rl '/etc/lucky' 2>/dev/null \
            | while read f; do
                sed -i 's|/etc/lucky|/etc/config/lucky.daji|g' "$f"
                echo "patched: $f"
              done

      # 2-c. 同步版本号
      - name: Sync PKG_VERSION
        run: |
          MAKEFILE="upstream/lucky/Makefile"
          echo "=== 修改前 ===" && grep "^PKG_VERSION" "$MAKEFILE"
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$VER_NUM/" "$MAKEFILE"
          echo "=== 修改后 ===" && grep "^PKG_VERSION" "$MAKEFILE"

      # 2-d. 替换 Build/Prepare（本地复制替代 wget）
      - name: Patch Makefile Build/Prepare
        run: |
          python3 - <<'EOF'
          import re, pathlib

          mk = pathlib.Path("upstream/lucky/Makefile").read_text()

          new_prepare = (
              "define Build/Prepare\n"
              "\tmkdir -p $(PKG_BUILD_DIR)\n"
              "\t@echo \">>> LUCKY_ARCH=$(LUCKY_ARCH)  LUCKY_BIN_DIR=$(LUCKY_BIN_DIR)\"\n"
              "\t@if [ ! -f \"$(LUCKY_BIN_DIR)/$(LUCKY_ARCH)/lucky\" ]; then \\\n"
              "\t\techo \"❌ 未找到预置二进制: $(LUCKY_BIN_DIR)/$(LUCKY_ARCH)/lucky\"; \\\n"
              "\t\texit 1; \\\n"
              "\tfi\n"
              "\tcp \"$(LUCKY_BIN_DIR)/$(LUCKY_ARCH)/lucky\" \"$(PKG_BUILD_DIR)/lucky\"\n"
              "\t@echo \"✅ 已复制二进制 [$(LUCKY_ARCH)]\"\n"
              "endef"
          )

          mk = re.sub(
              r'define Build/Prepare.*?endef',
              new_prepare,
              mk,
              flags=re.DOTALL
          )

          inject = (
              "\n# 由 CI 注入；本地构建时可手动指定\n"
              "LUCKY_BIN_DIR ?= /tmp/lucky-binaries\n\n"
          )
          mk = mk.replace(
              "include $(INCLUDE_DIR)/package.mk",
              inject + "include $(INCLUDE_DIR)/package.mk"
          )

          pathlib.Path("upstream/lucky/Makefile").write_text(mk)
          print("✅ Makefile 替换完成")
          EOF

          echo "=== 替换后 Build/Prepare ==="
          sed -n '/define Build\/Prepare/,/endef/p' upstream/lucky/Makefile

      # 2-e. 下载所有 Linux 架构二进制
      - name: Download Linux binaries
        run: |
          BASE_URL="${RELEASE_URL}/${VERSION}/${VER_NUM}_wanji"

          # 静态架构列表（与 build matrix 保持一致）
          ARCHS="arm64 armv5 armv6 armv7 i386 \
                 mips_hardfloat mips_softfloat \
                 mipsle_hardfloat mipsle_softfloat \
                 riscv64 x86_64"

          for arch in $ARCHS; do
            FILE="lucky_${VER_NUM}_Linux_${arch}_wanji.tar.gz"
            DEST="binaries/${arch}"
            mkdir -p "$DEST"

            echo "⬇️  [$arch] ${BASE_URL}/${FILE}"
            if wget -q -O "/tmp/${arch}.tar.gz" "${BASE_URL}/${FILE}"; then
              tar -xzf "/tmp/${arch}.tar.gz" -C "$DEST" 2>/dev/null
              if [ -f "$DEST/lucky" ]; then
                chmod +x "$DEST/lucky"
                echo "  ✅ $arch"
              else
                echo "  ⚠️  $arch 解压后无 lucky 二进制"
              fi
            else
              echo "  ❌ $arch 下载失败"
            fi
          done

          echo "=== 下载结果 ==="
          ls -la binaries/*/lucky 2>/dev/null || echo "无可用二进制"

      # 2-f. 上传 artifact
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: binaries/

      - name: Upload patched source
        uses: actions/upload-artifact@v4
        with:
          name: source
          path: upstream/

  # ──────────────────────────────────────────────────────
  # 3. SDK 编译（完全静态 matrix，不依赖动态输出）
  # ──────────────────────────────────────────────────────
  build:
    needs: [check-version, prepare]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # sdk_arch 是 OpenWrt SDK 的目标三元组
        # lucky_arch 是对应的二进制目录名
        include:
          - { sdk: openwrt-24.10, sdk_arch: x86_64,                    lucky_arch: x86_64           }
          - { sdk: openwrt-25.12, sdk_arch: x86_64,                    lucky_arch: x86_64           }
          - { sdk: openwrt-24.10, sdk_arch: i386_pentium4,             lucky_arch: i386             }
          - { sdk: openwrt-25.12, sdk_arch: i386_pentium4,             lucky_arch: i386             }
          - { sdk: openwrt-24.10, sdk_arch: aarch64_generic,           lucky_arch: arm64            }
          - { sdk: openwrt-25.12, sdk_arch: aarch64_generic,           lucky_arch: arm64            }
          - { sdk: openwrt-24.10, sdk_arch: arm_cortex-a9_vfpv3-d16,  lucky_arch: armv7            }
          - { sdk: openwrt-25.12, sdk_arch: arm_cortex-a9_vfpv3-d16,  lucky_arch: armv7            }
          - { sdk: openwrt-24.10, sdk_arch: arm_cortex-a7,            lucky_arch: armv6            }
          - { sdk: openwrt-25.12, sdk_arch: arm_cortex-a7,            lucky_arch: armv6            }
          - { sdk: openwrt-24.10, sdk_arch: arm_xscale,               lucky_arch: armv5            }
          - { sdk: openwrt-25.12, sdk_arch: arm_xscale,               lucky_arch: armv5            }
          - { sdk: openwrt-24.10, sdk_arch: mipsel_24kc,              lucky_arch: mipsle_softfloat }
          - { sdk: openwrt-25.12, sdk_arch: mipsel_24kc,              lucky_arch: mipsle_softfloat }
          - { sdk: openwrt-24.10, sdk_arch: mipsel_74kc,              lucky_arch: mipsle_hardfloat }
          - { sdk: openwrt-25.12, sdk_arch: mipsel_74kc,              lucky_arch: mipsle_hardfloat }
          - { sdk: openwrt-24.10, sdk_arch: mips_24kc,                lucky_arch: mips_softfloat   }
          - { sdk: openwrt-25.12, sdk_arch: mips_24kc,                lucky_arch: mips_softfloat   }
          - { sdk: openwrt-24.10, sdk_arch: mips_74kc,                lucky_arch: mips_hardfloat   }
          - { sdk: openwrt-25.12, sdk_arch: mips_74kc,                lucky_arch: mips_hardfloat   }
          - { sdk: openwrt-24.10, sdk_arch: riscv64_riscv64,          lucky_arch: riscv64          }
          - { sdk: openwrt-25.12, sdk_arch: riscv64_riscv64,          lucky_arch: riscv64          }

    steps:
      - name: Download patched source
        uses: actions/download-artifact@v4
        with:
          name: source
          path: openwrt-packages

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          name: binaries
          path: /tmp/lucky-binaries

      # 二进制不存在则跳过，不报错中断整个 matrix
      - name: Check binary & fix permissions
        id: check_bin
        run: |
          BIN="/tmp/lucky-binaries/${{ matrix.lucky_arch }}/lucky"
          if [ -f "$BIN" ]; then
            chmod +x "$BIN"
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✅ 找到二进制: $BIN"
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️  跳过 ${{ matrix.lucky_arch }}：二进制不存在"
          fi

      - name: Build with OpenWrt SDK
        if: steps.check_bin.outputs.skip == 'false'
        uses: sbwml/openwrt-gh-action-sdk@main
        env:
          ARCH: ${{ matrix.sdk_arch }}-${{ matrix.sdk }}
          FEEDNAME: packages_ci
          PACKAGES: lucky luci-app-lucky
          NO_REFRESH_CHECK: true
          LUCKY_ARCH: ${{ matrix.lucky_arch }}
          LUCKY_BIN_DIR: /tmp/lucky-binaries

      - name: Upload packages
        if: steps.check_bin.outputs.skip == 'false' && hashFiles('bin/packages/**/*.ipk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.lucky_arch }}-${{ matrix.sdk }}
          path: bin/packages/**/*.ipk

  # ──────────────────────────────────────────────────────
  # 4. 发布
  # ──────────────────────────────────────────────────────
  release:
    needs: [check-version, build]
    if: always() && needs.check-version.outputs.need_update == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release/
          pattern: ipk-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.version }}
          name: Lucky ${{ needs.check-version.outputs.version }}
          files: release/**/*.ipk
